name: Publish Activity Feed (manual)

# Manual dispatch only: keep feed local by default. Run this workflow
# manually from GitHub Actions if you want to publish the static feed.
on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate static activity feed
        run: |
          set -e
          mkdir -p public
          cat > public/header.html <<'HTML'
          <!doctype html>
          <html>
          <head>
          <meta charset="utf-8" />
          <meta name="viewport" content="width=device-width,initial-scale=1" />
          <title>Repository Activity Feed</title>
          <style>
          body{font-family:system-ui,Segoe UI,Arial;margin:0;padding:12px;background:#0f1724;color:#e6eef8}
          .container{max-width:980px;margin:0 auto}
          h1{margin:0 0 8px 0}
          .item{padding:8px;border-bottom:1px solid rgba(255,255,255,0.04)}
          .meta{font-size:12px;color:#9fb0c8}
          pre{white-space:pre-wrap;background:#071022;padding:8px;border-radius:6px;color:#bfe5ff;overflow:auto}
          </style>
          </head>
          <body>
          <div class="container">
          <h1>Repository Activity Feed</h1>
          <div id="feed">
          HTML

          git log -n 200 --pretty=format:'<div class="item"><div class="meta">%ad — %h — %an</div><pre>%s</pre></div>' --date=iso > public/body.html || true

          # assemble
          cat public/header.html public/body.html > public/index.html
          cat >> public/index.html <<'HTML'
          </div>
          </div>
          </body>
          </html>
          HTML

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
